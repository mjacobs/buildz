services:
  postgres:
    image: postgres:16
    container_name: buildz-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: buildz
      POSTGRES_PASSWORD: buildz
      POSTGRES_DB: inventory
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/00_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buildz -d inventory"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
